name: Daily Dog Blog Generator

on:
  schedule:
    - cron: "0 4 * * *"

  workflow_dispatch:
    inputs:
      blogs_per_day:
        description: "How many blogs to generate this run"
        required: false
        default: "1"
      dry_run:
        description: "Generate fake test blogs without Gemini API? true/false"
        required: false
        default: "false"
      clear_previous:
        description: "Clear old generated drafts after a new batch succeeds? true/false"
        required: false
        default: "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dog-blog-pages
  cancel-in-progress: true

jobs:
  generate-blogs:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash-lite
      BLOGS_PER_DAY: ${{ github.event.inputs.blogs_per_day || '1' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      CLEAR_PREVIOUS: ${{ github.event.inputs.clear_previous || 'true' }}
      SLEEP_SECONDS_BETWEEN_CALLS: "20"
      MAX_RETRIES: "6"
      TRIGGER_WORKER_URL: ${{ vars.TRIGGER_WORKER_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix folder structure
        run: |
          mkdir -p scripts
          mkdir -p data
          mkdir -p blogs

          if [ ! -f scripts/generate_blogs.py ] && [ -f generate_blogs.py ]; then
            cp generate_blogs.py scripts/generate_blogs.py
          fi

          if [ ! -f scripts/build_index.py ] && [ -f build_index.py ]; then
            cp build_index.py scripts/build_index.py
          fi

          if [ ! -f data/products.json ] && [ -f products.json ]; then
            cp products.json data/products.json
          fi

          if [ ! -f data/generated_blogs.json ] && [ -f generated_blogs.json ]; then
            cp generated_blogs.json data/generated_blogs.json
          fi

          if [ ! -f data/generated_blogs.json ]; then
            echo "[]" > data/generated_blogs.json
          fi

          if [ ! -f data/topic_history.json ]; then
            echo "[]" > data/topic_history.json
          fi

          echo "Folder check:"
          ls -la
          echo "Scripts:"
          ls -la scripts
          echo "Data:"
          ls -la data
          echo "Blogs:"
          ls -la blogs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate blog drafts
        run: python scripts/generate_blogs.py

      - name: Build preview website
        run: python scripts/build_index.py

      - name: Commit generated files
        run: |
          git config user.name "dog-blog-agent"
          git config user.email "dog-blog-agent@users.noreply.github.com"

          git add scripts/ data/ blogs/ index.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate daily dog blog drafts"

            echo "Pulling latest remote changes before push..."
            git pull --rebase origin main

            echo "Pushing generated blog drafts..."
            git push origin main
          fi

      - name: Prepare Pages site
        run: |
          rm -rf _site
          mkdir -p _site

          cp index.html _site/index.html

          if [ -d blogs ]; then
            cp -r blogs _site/blogs
          fi

          if [ -d data ]; then
            cp -r data _site/data
          fi

          touch _site/.nojekyll

          echo "Prepared _site:"
          ls -la _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
